<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Airport benchmarks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: "Figtree", Arial, Helvetica, sans-serif; }
body {
  --navy: #122f5e;
  --red: #b22543;
  --white: #f0f2f4;
  --soft-blue: #dde4f0;
  --soft-red: #f5dde2;
  --ink: #0d1f3c;
  --muted: #3d5278;
  background: linear-gradient(135deg, #dde4f0 0%, #f0f2f4 45%, #f5dde2 100%);
  color: var(--ink);
  min-height: 100vh;
  padding: 28px;
}
.slide {
  width: 100%;
  max-width: 1380px;
  min-height: 92vh;
  margin: 0 auto;
  background: linear-gradient(180deg, var(--white) 0%, #e8ecf2 100%);
  border: 2px solid #c0cde6;
  border-top: 10px solid var(--red);
  border-radius: 24px;
  box-shadow: 0 16px 40px rgba(18, 47, 94, 0.12);
  padding: 34px 40px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  gap: 18px;
}
.slide::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(178,37,67,0.05), transparent 28%),
    radial-gradient(circle at 80% 80%, rgba(18,47,94,0.06), transparent 32%);
  pointer-events: none;
}
.title-wrap {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 20px;
}
h1 {
  font-size: 2rem;
  color: var(--navy);
  font-weight: 800;
  line-height: 1.08;
  text-align: left;
  margin: 0;
}
.subtitle {
  color: var(--muted);
  font-size: 1rem;
  max-width: 860px;
  line-height: 1.45;
  margin-top: 6px;
  text-align: left;
}
.content.equal {
  position: relative;
  z-index: 1; display:grid; grid-template-columns: 1fr 1fr; gap: 18px; min-height: 0; flex:1; }
.panel {
  background: rgba(255,255,255,0.58);
  border: 1px solid #cad5e8;
  border-radius: 20px;
  padding: 14px 14px 10px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
  display: flex;
  flex-direction: column;
  min-height: 0;
  position: relative;
}
.panel h2 {
  color: var(--navy);
  font-size: 1.14rem;
  margin: 0 0 7px 4px;
  line-height: 1.25;
  text-align: left;
  font-weight: 700;
}
.panel p.note {
  color: var(--muted);
  font-size: 0.94rem;
  margin: 0 0 8px 4px;
  line-height: 1.35;
  text-align: left;
}
.chart {
  width: 100%;
  height: 100%;
  min-height: 420px;
}
.foot {
  position: relative;
  z-index: 1;
  color: var(--muted);
  font-size: 0.82rem;
  display: flex;
  justify-content: space-between;
  gap: 12px;
}
@media (max-width: 1100px) { .content.equal { grid-template-columns: 1fr; } .chart {
  width: 100%;
  height: 100%;
  min-height: 420px;
} }
</style>
</head>
<body>
  <div class="slide">
    <div class="title-wrap">
      <div>
        <h1>Newark underperforms major U.S. airports on both on-time reliability and passenger satisfaction</h1>
      </div>
    </div>
    <div class="content equal">
      <section class="panel">
        <h2>2025 airport on-time departure performance</h2>
        <div id="ontime" class="chart"></div>
      </section>
      <section class="panel">
        <h2>2025 airport satisfaction score</h2>
        <div id="satisfaction" class="chart"></div>
      </section>
    </div>
  </div>
<script>
const airportData = [{"code": "MSP", "name": "Minneapolis–St. Paul International Airport", "ontime": 80, "ontime_rank": 4, "sat": 660}, {"code": "LAS", "name": "Harry Reid International Airport", "ontime": 76, "ontime_rank": 12, "sat": 619}, {"code": "JFK", "name": "John F. Kennedy International Airport", "ontime": 77, "ontime_rank": 9, "sat": 618}, {"code": "MCO", "name": "Orlando International Airport", "ontime": 74, "ontime_rank": 21, "sat": 618}, {"code": "MIA", "name": "Miami International Airport", "ontime": 73, "ontime_rank": 26, "sat": 615}, {"code": "SFO", "name": "San Francisco International Airport", "ontime": 78, "ontime_rank": 8, "sat": 613}, {"code": "FLL", "name": "Fort Lauderdale-Hollywood International Airport", "ontime": 74, "ontime_rank": 24, "sat": 606}, {"code": "DEN", "name": "Denver International Airport", "ontime": 74, "ontime_rank": 25, "sat": 596}, {"code": "ATL", "name": "Hartsfield-Jackson Atlanta International Airport", "ontime": 75, "ontime_rank": 18, "sat": 590}, {"code": "LAX", "name": "Los Angeles International Airport", "ontime": 81, "ontime_rank": 3, "sat": 589}, {"code": "SEA", "name": "Seattle-Tacoma International Airport", "ontime": 78, "ontime_rank": 8, "sat": 583}, {"code": "CLT", "name": "Charlotte Douglas International Airport", "ontime": 74, "ontime_rank": 19, "sat": 581}, {"code": "EWR", "name": "Newark Liberty International Airport", "ontime": 75, "ontime_rank": 16, "sat": 565}];
const ontimeOrder = ["LAX", "MSP", "SFO", "SEA", "JFK", "LAS", "ATL", "EWR", "MCO", "FLL", "DEN", "CLT", "MIA"];
const satisfactionOrder = ["MSP", "LAS", "JFK", "MCO", "MIA", "SFO", "FLL", "DEN", "ATL", "LAX", "SEA", "CLT", "EWR"];

const byCode = Object.fromEntries(airportData.map(d => [d.code, d]));
const ewrColor = '#b22543';
const baseColor = '#122f5e';
const mutedLine = '#0d1f3c';

function colorsFor(order) {
  return order.map(code => code === 'EWR' ? ewrColor : baseColor);
}
function outlineFor(order) {
  return order.map(code => code === 'EWR' ? '#ffffff' : mutedLine);
}

const ontimeCodes = ontimeOrder.slice().reverse();
const satCodes = satisfactionOrder.slice().reverse();

const ontimeTrace = {
  type: 'bar',
  orientation: 'h',
  x: ontimeCodes.map(c => byCode[c].ontime),
  y: ontimeCodes,
  customdata: ontimeCodes.map(c => [byCode[c].name, byCode[c].ontime_rank, byCode[c].sat]),
  text: ontimeCodes.map(c => byCode[c].ontime + '%'),
  textposition: 'outside',
  hovertemplate: '<b>%{y}</b> — %{customdata[0]}<br>On-time departures: %{x}%<br>BTS rank among major U.S. airports: %{customdata[1]}<br>J.D. Power score: %{customdata[2]}<extra></extra>',
  marker: {
    color: colorsFor(ontimeCodes),
    line: {color: outlineFor(ontimeCodes), width: 0.5}
  },
  cliponaxis: false,
  hoverlabel: {bgcolor: '#ffffff', bordercolor: '#122f5e', font: {color: '#0d1f3c'}}
};

const satisfactionTrace = {
  type: 'bar',
  orientation: 'h',
  x: satCodes.map(c => byCode[c].sat),
  y: satCodes,
  customdata: satCodes.map(c => [byCode[c].name, byCode[c].ontime, byCode[c].ontime_rank]),
  text: satCodes.map(c => String(byCode[c].sat)),
  textposition: 'outside',
  hovertemplate: '<b>%{y}</b> — %{customdata[0]}<br>J.D. Power score: %{x} / 1000<br>On-time departures: %{customdata[1]}%<br>BTS rank among major U.S. airports: %{customdata[2]}<extra></extra>',
  marker: {
    color: colorsFor(satCodes),
    line: {color: outlineFor(satCodes), width: 0.5}
  },
  cliponaxis: false,
  hoverlabel: {bgcolor: '#ffffff', bordercolor: '#122f5e', font: {color: '#0d1f3c'}}
};

const commonLayout = {
  margin: {l: 78, r: 56, t: 8, b: 42},
  paper_bgcolor: 'rgba(0,0,0,0)',
  plot_bgcolor: 'rgba(0,0,0,0)',
  xaxis: {
    gridcolor: '#d6deeb',
    zeroline: false,
    tickfont: {color: '#3d5278'},
    titlefont: {color: '#122f5e'}
  },
  yaxis: {
    automargin: true,
    tickfont: {color: '#122f5e', size: 12}
  },
  showlegend: false,
  hovermode: 'closest'
};

Plotly.newPlot('ontime', [ontimeTrace], {
  ...commonLayout,
  xaxis: {
    ...commonLayout.xaxis,
    title: 'On-time departures (%)',
    range: [68, 84]
  }
}, {responsive: true, displaylogo: false});

Plotly.newPlot('satisfaction', [satisfactionTrace], {
  ...commonLayout,
  xaxis: {
    ...commonLayout.xaxis,
    title: 'Satisfaction score',
    range: [550, 675]
  }
}, {responsive: true, displaylogo: false});

const ontimeDiv = document.getElementById('ontime');
const satisfactionDiv = document.getElementById('satisfaction');

const ontimeIndex = Object.fromEntries(ontimeCodes.map((c, i) => [c, i]));
const satisfactionIndex = Object.fromEntries(satCodes.map((c, i) => [c, i]));

let syncing = false;

function hoverOther(source, code) {
  if (syncing) return;
  syncing = true;
  try {
    if (source === 'ontime' && satisfactionIndex[code] !== undefined) {
      Plotly.Fx.hover('satisfaction', [{curveNumber: 0, pointNumber: satisfactionIndex[code]}]);
    } else if (source === 'satisfaction' && ontimeIndex[code] !== undefined) {
      Plotly.Fx.hover('ontime', [{curveNumber: 0, pointNumber: ontimeIndex[code]}]);
    }
  } finally {
    setTimeout(() => syncing = false, 0);
  }
}

ontimeDiv.on('plotly_hover', (ev) => {
  const code = ev.points[0].y;
  hoverOther('ontime', code);
});
satisfactionDiv.on('plotly_hover', (ev) => {
  const code = ev.points[0].y;
  hoverOther('satisfaction', code);
});

ontimeDiv.on('plotly_unhover', () => {
  Plotly.Fx.unhover('satisfaction');
});
satisfactionDiv.on('plotly_unhover', () => {
  Plotly.Fx.unhover('ontime');
});
</script>
</body>
</html>
