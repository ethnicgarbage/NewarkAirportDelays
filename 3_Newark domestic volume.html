<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Network and destinations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: "Figtree", Arial, Helvetica, sans-serif; }
body {
  --navy: #122f5e;
  --red: #b22543;
  --white: #f0f2f4;
  --soft-blue: #dde4f0;
  --soft-red: #f5dde2;
  --ink: #0d1f3c;
  --muted: #3d5278;
  background: linear-gradient(135deg, #dde4f0 0%, #f0f2f4 45%, #f5dde2 100%);
  color: var(--ink);
  min-height: 100vh;
  padding: 28px;
}
.slide {
  width: 100%;
  max-width: 1380px;
  min-height: 92vh;
  margin: 0 auto;
  background: linear-gradient(180deg, var(--white) 0%, #e8ecf2 100%);
  border: 2px solid #c0cde6;
  border-top: 10px solid var(--red);
  border-radius: 24px;
  box-shadow: 0 16px 40px rgba(18, 47, 94, 0.12);
  padding: 34px 40px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  gap: 18px;
}
.slide::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(178,37,67,0.05), transparent 28%),
    radial-gradient(circle at 80% 80%, rgba(18,47,94,0.06), transparent 32%);
  pointer-events: none;
}
.title-wrap {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 20px;
}
h1 {
  font-size: 2rem;
  color: var(--navy);
  font-weight: 800;
  line-height: 1.08;
  text-align: left;
  margin: 0;
}
.subtitle {
  color: var(--muted);
  font-size: 1rem;
  max-width: 860px;
  line-height: 1.45;
  margin-top: 6px;
  text-align: left;
}
.content.two {
  position: relative;
  z-index: 1; display:grid; grid-template-columns: 1.4fr 0.95fr; gap: 18px; min-height: 0; flex:1; }
.panel {
  background: rgba(255,255,255,0.58);
  border: 1px solid #cad5e8;
  border-radius: 20px;
  padding: 14px 14px 10px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
  display: flex;
  flex-direction: column;
  min-height: 0;
  position: relative;
}
.panel h2 {
  color: var(--navy);
  font-size: 1.14rem;
  margin: 0 0 7px 4px;
  line-height: 1.25;
  text-align: left;
  font-weight: 700;
}
.panel p.note {
  color: var(--muted);
  font-size: 0.94rem;
  margin: 0 0 8px 4px;
  line-height: 1.35;
  text-align: left;
}
.chart {
  width: 100%;
  height: 100%;
  min-height: 420px;
}
.foot {
  position: relative;
  z-index: 1;
  color: var(--muted);
  font-size: 0.82rem;
  display: flex;
  justify-content: space-between;
  gap: 12px;
}
@media (max-width: 1100px) { .content.two { grid-template-columns: 1fr; } .chart {
  width: 100%;
  height: 100%;
  min-height: 420px;
} }
</style>
</head>
<body>
  <div class="slide">
    <div class="title-wrap">
      <div>
        <h1>Newark’s 2025 network shows demand concentrated in high-volume domestic corridors</h1>
      </div>
    </div>
    <div class="content two">
      <section class="panel">
        <h2>2025 U.S. destination map from Newark</h2>
        <div id="map" class="chart"></div>
      </section>
      <section class="panel">
        <h2>Most frequent U.S. Newark destinations in 2025</h2>
        <div id="bar" class="chart"></div>
      </section>
    </div>
  </div>

<script>

ton National Airport"], ["MSN", 333, "Madison", "Dane County Regional Truax Field"], ["JAC", 290, "Jackson", "Jackson Hole Airport"], ["SMF", 281, "Sacramento", "Sacramento International Airport"], ["AVL", 259, "Asheville", "Asheville Regional Airport"], ["RIC", 235, "Richmond", "Richmond International Airport"], ["ILM", 210, "Wilmington", "Wilmington International Airport"], ["HHH", 210, "Hilton Head Island", "Hilton Head Airport"], ["TYS", 164, "Knoxville/Maryville", "McGhee Tyson Airport"], ["HNL", 127, "Honolulu, Oahu", "Daniel K. Inouye International Airport"], ["VPS", 121, "Valparaiso", "Destin-Fort Walton Beach Airport"], ["EGE", 102, "Eagle", "Eagle County Regional Airport"], ["ANC", 102, "Anchorage", "Ted Stevens Anchorage International Airport"], ["MTJ", 84, "Montrose", "Montrose Regional Airport"], ["HDN", 84, "Hayden", "Yampa Valley Airport"], ["BHM", 79, "Birmingham", "Birmingham-Shuttlesworth International Airport"], ["DSM", 68, "Des Moines", "Des Moines International Airport"], ["CAE", 58, "Columbia", "Columbia Metropolitan Airport"], ["CHA", 56, "Chattanooga", "Chattanooga Metropolitan Airport (Lovell Field)"], ["ALB", 42, "Albany", "Albany International Airport"], ["MDW", 33, "Chicago", "Chicago Midway International Airport"], ["ATW", 26, "Appleton", "Appleton International Airport"], ["FNT", 22, "Flint", "Bishop International Airport"], ["GSO", 22, "Greensboro", "Piedmont Triad International Airport"], ["PSP", 14, "Palm Springs", "Palm Springs International Airport"], ["PVD", 11, "Providence/Warwick", "Rhode Island T. F. Green International Airport"], ["SBN", 7, "South Bend", "South Bend International Airport"], ["ITH", 4, "Ithaca", "Ithaca Tompkins Regional Airport"], ["OMA", 4, "Omaha", "Eppley Airfield"], ["OGG", 3, "Kahului", "Kahului International Airport"], ["RNO", 3, "Reno", "Reno Tahoe International Airport"], ["XNA", 2, "Fayetteville/Springdale/Rogers", "Northwest Arkansas National Airport"]];
const destLats = [41.9786, 28.429399, 33.6367, 33.942501, 26.072599, 37.619806, 25.796011, 29.9844, 42.36197, 35.214001, 26.683201, 32.896801, 42.21377, 39.860027, 36.083361, 27.9755, 35.878659, 33.435302, 44.880081, 26.534685, 39.7173, 47.447943, 41.411701, 30.197535, 36.1245, 40.491501, 39.998001, 32.733601, 38.9445, 32.896159, 30.492469, 40.78886, 29.993401, 33.675063, 39.048801, 32.126591, 33.679699, 38.748697, 43.646198, 27.394631, 38.1706, 45.588699, 42.880798, 42.947201, 36.895341, 44.471901, 43.1189, 34.895699, 29.533701, 43.111198, 44.806364, 42.940498, 24.556119, 39.301699, 45.778853, 35.043845, 38.8521, 43.1399, 43.6073, 38.6954, 35.435488, 37.505199, 34.272345, 32.2244, 35.811001, 21.318387, 30.481315, 39.642601, 61.179004, 38.5098, 40.481201, 33.562877, 41.534027, 33.938172, 35.035301, 42.748299, 41.785999, 44.258515, 42.969294, 36.09937, 33.8297, 41.725038, 41.708304, 42.491001, 41.3032, 20.896263, 39.4991, 36.281898];
const destLons = [-87.9048, -81.308998, -84.428101, -118.407997, -80.152702, -122.374821, -80.289751, -95.3414, -71.0079, -80.9431, -80.095596, -97.038002, -83.353786, -104.673792, -115.151817, -82.533203, -78.7873, -112.005905, -93.221741, -81.752816, -86.294403, -122.310276, -81.8498, -97.662015, -86.6782, -80.232903, -82.891899, -117.190002, -77.455803, -80.038151, -81.687813, -111.979866, -90.264673, -117.869281, -84.667801, -81.19998, -78.928299, -90.370003, -70.309303, -82.554359, -85.735076, -122.598, -85.522797, -87.896599, -76.201, -73.153297, -77.672401, -82.218903, -98.469803, -76.1063, -68.826668, -78.732201, -81.759579, -94.713893, -111.153711, -89.97634, -77.037697, -89.337502, -110.737999, -121.591003, -82.541853, -77.319702, -77.905117, -80.697502, -83.994003, -157.92567, -86.515839, -106.917999, -149.992561, -107.893997, -107.218002, -86.750712, -93.656719, -81.123022, -85.203796, -73.801697, -87.752403, -88.519, -83.743355, -79.937262, -116.507004, -71.425668, -86.316922, -76.458397, -95.894096, -156.431837, -119.767998, -94.306801];
const topBarCodes = ["LAS", "DEN", "DTW", "DFW", "PBI", "CLT", "BOS", "IAH", "MIA", "SFO", "FLL", "LAX", "ATL", "MCO", "ORD"];
const mapEl = document.getElementById('map');
const barEl = document.getElementById('bar');
const ewrLat = 40.6894;
const ewrLon = -74.170545;

const codeToIndex = Object.fromEntries(routeData.map((row, i) => [row[0], i]));
const topCodeToBarIndex = Object.fromEntries(topBarCodes.map((code, i) => [code, i]));

const lineTraces = routeData.map((row, i) => ({
  type: 'scattergeo',
  mode: 'lines',
  lat: [ewrLat, destLats[i]],
  lon: [ewrLon, destLons[i]],
  customdata: [[row[0], row[1], row[2], row[3]]],
  hovertemplate: '<b>%{customdata[0]}</b> — %{customdata[2]}<br>%{customdata[3]}<br>Departures: %{customdata[1]:,}<extra></extra>',
  line: {width: 2.2, color: 'rgba(31,95,191,0.22)'},
  showlegend: false
}));

const markerTrace = {
  type: 'scattergeo',
  mode: 'markers',
  lat: destLats,
  lon: destLons,
  customdata: routeData,
  hovertemplate: '<b>%{customdata[0]}</b> — %{customdata[2]}<br>%{customdata[3]}<br>Departures: %{customdata[1]:,}<extra></extra>',
  marker: {
    size: routeData.map(r => Math.max(10, 8 + Math.sqrt(r[1]) / 3.6)),
    color: routeData.map(r => r[1]),
    colorscale: 'Blues',
    reversescale: true,
    opacity: 0.92,
    line: {color: '#ffffff', width: 1.3},
    colorbar: {title: 'Departures', thickness: 12, len: 0.6, x: 0.98, y: 0.5, outlinewidth: 0}
  },
  showlegend: false
};

const newarkTrace = {
  type: 'scattergeo',
  mode: 'markers+text',
  lat: [ewrLat],
  lon: [ewrLon],
  text: ['EWR'],
  textposition: 'top center',
  hovertemplate: '<b>EWR</b><br>Newark Liberty International Airport<extra></extra>',
  marker: {size: 15, color: '#c62828', line: {color:'#fff', width: 1.6}},
  showlegend: false
};

Plotly.newPlot('map', [...lineTraces, markerTrace, newarkTrace], {
  margin: {l: 0, r: 0, t: 6, b: 0},
  paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
  geo: {
    scope: 'usa', projection: {type: 'albers usa'}, bgcolor: 'rgba(0,0,0,0)',
    showland: true, landcolor: '#eef2f8', subunitcolor: '#c2cee0', countrycolor: '#c2cee0', showlakes: true, lakecolor: '#ffffff'
  }
}, {responsive: true, displaylogo: false});

Plotly.newPlot('bar', [{
  type: 'bar',
  orientation: 'h',
  x: topBarCodes.map(code => routeData[codeToIndex[code]][1]),
  y: topBarCodes,
  customdata: topBarCodes.map(code => routeData[codeToIndex[code]]),
  text: topBarCodes.map(code => routeData[codeToIndex[code]][1].toLocaleString()),
  textposition: 'outside',
  cliponaxis: false,
  marker: {
    color: topBarCodes.map(code => routeData[codeToIndex[code]][1]),
    colorscale: 'Blues',
    reversescale: true,
    line: {color: '#ffffff', width: 1}
  },
  hovertemplate: '<b>%{customdata[0]}</b> — %{customdata[2]}<br>%{customdata[3]}<br>Departures: %{x:,}<extra></extra>'
}], {
  margin: {l: 70, r: 30, t: 4, b: 48},
  paper_bgcolor: 'rgba(0,0,0,0)',
  plot_bgcolor: 'rgba(0,0,0,0)',
  xaxis: { title: 'Departures', gridcolor: '#dbe4f2', zeroline: false },
  yaxis: { title: '', automargin: true }
}, {
  responsive: true,
  displaylogo: false,
  modeBarButtonsToRemove: ['select2d','lasso2d','toggleSpikelines']
});

function hoverBarForCode(code) {
  if (code in topCodeToBarIndex) {
    Plotly.Fx.hover('bar', [{curveNumber: 0, pointNumber: topCodeToBarIndex[code]}]);
  }
}

function hoverMapForCode(code) {
  const routeIdx = codeToIndex[code];
  if (routeIdx == null) return;
  const markerTraceIndex = lineTraces.length;
  Plotly.Fx.hover('map', [{curveNumber: markerTraceIndex, pointNumber: routeIdx}], ['geo']);
}

mapEl.on('plotly_hover', (ev) => {
  const pt = ev.points && ev.points[0];
  if (!pt) return;
  let code = null;
  if (Array.isArray(pt.customdata)) code = pt.customdata[0];
  else if (pt.data && Array.isArray(pt.data.customdata) && Array.isArray(pt.data.customdata[0])) code = pt.data.customdata[0][0];
  if (code) hoverBarForCode(code);
});

barEl.on('plotly_hover', (ev) => {
  const pt = ev.points && ev.points[0];
  if (!pt || !Array.isArray(pt.customdata)) return;
  const code = pt.customdata[0];
  if (code) hoverMapForCode(code);
});

mapEl.on('plotly_unhover', () => { Plotly.Fx.unhover('bar'); });
barEl.on('plotly_unhover', () => { Plotly.Fx.unhover('map'); });
</script>

</body>
</html>
