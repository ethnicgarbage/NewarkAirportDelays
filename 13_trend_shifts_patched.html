
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAS Trend and Shift Delay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Figtree", Arial, Helvetica, sans-serif; }
    body {
  --navy: #122f5e;
  --red: #b22543;
  --white: #f0f2f4;
  --soft-blue: #dde4f0;
  --soft-red: #f5dde2;
  --ink: #0d1f3c;
  --muted: #3d5278;
  background: linear-gradient(135deg, #dde4f0 0%, #f0f2f4 45%, #f5dde2 100%);
  color: var(--ink);
  min-height: 100vh;
  padding: 28px;
}
    .slide {
  width: 100%;
  max-width: 1380px;
  min-height: 92vh;
  margin: 0 auto;
  background: linear-gradient(180deg, var(--white) 0%, #e8ecf2 100%);
  border: 2px solid #c0cde6;
  border-top: 10px solid var(--red);
  border-radius: 24px;
  box-shadow: 0 16px 40px rgba(18, 47, 94, 0.12);
  padding: 34px 40px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  gap: 18px;
}
    .slide::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(178,37,67,0.05), transparent 28%),
    radial-gradient(circle at 80% 80%, rgba(18,47,94,0.06), transparent 32%);
  pointer-events: none;
}
    .title-wrap {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 20px;
}
    h1 {
  font-size: 2rem;
  color: var(--navy);
  font-weight: 800;
  line-height: 1.08;
  text-align: left;
  margin: 0;
}
    .subtitle {
  color: var(--muted);
  font-size: 1rem;
  max-width: 860px;
  line-height: 1.45;
  margin-top: 6px;
  text-align: left;
}
    .accent { color: var(--red); }
    .kpi-row {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .kpi-card {
      background: rgba(255,255,255,0.62);
      border: 1px solid #cad5e8;
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }
    .kpi-card .value {
      font-size: 1.28rem;
      font-weight: 800;
      color: var(--navy);
      line-height: 1.15;
    }
    .kpi-card .value.red { color: var(--red); }
    .kpi-card .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-top: 5px;
      line-height: 1.35;
    }
    .content {
      position: relative;
      z-index: 1;
      display:grid;
      gap: 18px;
      flex: 1;
      min-height: 0;
      grid-template-columns: 1.25fr 1fr;
      align-items: stretch;
    }
    .panel {
  background: rgba(255,255,255,0.58);
  border: 1px solid #cad5e8;
  border-radius: 20px;
  padding: 12px 10px 8px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
  display: flex;
  flex-direction: column;
  min-height: 0;
  position: relative;
}
    .panel h2 {
  color: var(--navy);
  font-size: 1.14rem;
  margin: 0 0 7px 4px;
  line-height: 1.25;
  text-align: left;
  font-weight: 700;
}
    .panel p.note {
  color: var(--muted);
  font-size: 0.94rem;
  margin: 0 0 8px 4px;
  line-height: 1.35;
  text-align: left;
}
    .chart-wrap {
  position: relative;
  flex: 1;
  min-height: 0;
  height: 420px;
}
    canvas {
      width: 100% !important;
      height: 100% !important;
    }
    .chart {
  width: 100%;
  height: 100%;
  min-height: 420px;
}
    .hm-tooltip {
      position: absolute;
      background: var(--ink);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 5px 9px;
      border-radius: 6px;
      pointer-events: none;
      display: none;
      z-index: 20;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .foot {
  position: relative;
  z-index: 1;
  color: var(--muted);
  font-size: 0.82rem;
  display: flex;
  justify-content: space-between;
  gap: 12px;
}
    @media (max-width: 1100px) {
      .content { grid-template-columns: 1fr; }
      .kpi-row { grid-template-columns: 1fr 1fr; }
      .chart-wrap {
  position: relative;
  flex: 1;
  min-height: 0;
  height: 420px;
}
    }
  </style>
</head>
<body>
<div class="slide">

  <div class="title-wrap">
    <div>
      <h1>NAS Delay at Newark Grew 51% Between 2022 and 2025 While Carrier Delay Fell 31%</h1>
    </div>
  </div>

  <div class="content">
    <section class="panel">
      <h2>Airport Driven NAS Delay Cost an Estimated $57.9 Million in 2025 and Is Still Rising</h2>
      <div class="chart-wrap chart">
        <canvas id="nasTrendCanvas"></canvas>
      </div>
    </section>

    <section class="panel">
      <h2>Afternoon and Evening Shifts Need 4 to 5 More Staff to Reduce Airport Driven Delay</h2>
      <div class="chart-wrap chart">
        <canvas id="staffCanvas"></canvas>
      </div>
    </section>
  </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const NAVY = '#122f5e', RED = '#b22543', MUTED = '#3d5278', INK = '#0d1f3c';

(function () {
  const ctx = document.getElementById('nasTrendCanvas').getContext('2d');
  const nasData = [3.772, 3.525, 4.167, 5.708];
  const carrierData = [7.024, 6.284, 4.914, 4.846];

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['2022', '2023', '2024', '2025'],
      datasets: [
        {
          label: 'NAS delay (minutes)',
          data: nasData,
          borderColor: RED,
          backgroundColor: 'rgba(178,37,67,0.10)',
          borderWidth: 3,
          pointRadius: 5,
          pointBackgroundColor: RED,
          fill: true,
          tension: 0.35
        },
        {
          label: 'Carrier delay (minutes)',
          data: carrierData,
          borderColor: NAVY,
          backgroundColor: 'rgba(18,47,94,0.08)',
          borderWidth: 3,
          pointRadius: 5,
          pointBackgroundColor: NAVY,
          fill: true,
          tension: 0.35
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { size: 15, family: 'Figtree' }, color: INK, boxWidth: 12, padding: 12 }
        },
        tooltip: {
          callbacks: {
            label(ctx) {
              return `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(3)} min`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { font: { size: 15, family: 'Figtree' }, color: MUTED },
          grid: { display: false }
        },
        y: {
          min: 2, max: 9,
          ticks: { font: { size: 15, family: 'Figtree' }, color: MUTED, stepSize: 1 },
          grid: { color: 'rgba(18,47,94,0.08)' },
          title: { display: true, text: 'Average minutes per flight', font: { size: 15, family: 'Figtree' }, color: MUTED }
        }
      }
    },
    plugins: [{
      id: 'trendLabels',
      afterDatasetsDraw(chart) {
        const c = chart.ctx;
        const nasMeta = chart.getDatasetMeta(0);
        const carMeta = chart.getDatasetMeta(1);
        c.save();
        c.font = 'bold 20px Figtree, Arial';
        c.fillStyle = RED;
        c.textAlign = 'left';
        c.fillText('+5', Math.min(nasMeta.data[3].x + 10, chart.chartArea.right - 48), nasMeta.data[3].y + 10);
        c.fillStyle = NAVY;
        c.fillText('−3', Math.min(carMeta.data[3].x + 10, chart.chartArea.right - 48), carMeta.data[3].y + 16);
        c.restore();
      }
    }]
  });
})();

(function () {
  const ctx = document.getElementById('staffCanvas').getContext('2d');
  const totalDelay = [7.38, 10.14, 13.54, 16.13];
  const nasDelay = [2.89, 4.39, 6.01, 4.87];
  const carrDelay = totalDelay.map((t, i) => +(t - nasDelay[i]).toFixed(2));
  // Severity labels float above each bar — colored green→amber→red by gap severity
  const gapNotes  = ['Adequate', 'Monitor', '+2–3 ATC\\n+1–2 Gate', '+2–3 ATC\\n+2 Crew'];
  const gapColors = ['#2e8a32', '#a07800', RED, RED];

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: [['Morning','05–12'], ['Midday','12–15'], ['Afternoon','15–19'], ['Evening','19–24']],
      datasets: [
        {
          // Bottom segment — airline-side delay (not directly addressable by airport staffing)
          label: 'Carrier / Other Delay  (airline-side)',
          data: carrDelay,
          backgroundColor: 'rgba(61,82,120,0.50)',
          borderColor:      'rgba(61,82,120,0.85)',
          borderWidth: 1,
          borderRadius: 4,
          stack: 'delay'
        },
        {
          // Top segment — airport-driven delay; this is what additional ATC coordinators reduce
          label: 'NAS Delay  (airport-driven — staffing-sensitive)',
          data: nasDelay,
          backgroundColor: 'rgba(178,37,67,0.78)',
          borderColor:      'rgba(178,37,67,1.0)',
          borderWidth: 1,
          borderRadius: 4,
          stack: 'delay'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { size: 15, family: 'Figtree' }, color: INK, boxWidth: 12, padding: 10 }
        },
        tooltip: {
          callbacks: {
            footer(items) {
              const notes = ['No staffing gap', 'Monitor closely', '+2–3 ATC coordinators, +1–2 gate staff', '+2–3 ATC coordinators, +2 crew dispatchers'];
              return `Staffing gap: ${notes[items[0].dataIndex]}`;
            }
          }
        }
      },
      scales: {
        x: {
          stacked: true,
          ticks: { font: { size: 15, family: 'Figtree' }, color: MUTED },
          grid: { display: false }
        },
        y: {
          stacked: true,
          min: 0, max: 15,
          ticks: { font: { size: 15, family: 'Figtree' }, color: MUTED, stepSize: 4 },
          grid: { color: 'rgba(18,47,94,0.08)' },
          title: { display: true, text: 'Average delay (min)', font: { size: 15, family: 'Figtree' }, color: MUTED }
        }
      }
    },
    plugins: [{
      id: 'gapLabels',
      afterDatasetsDraw(chart) {
        const c = chart.ctx;
        const y = chart.scales.y;
        const meta0 = chart.getDatasetMeta(0);
        c.save();
        gapNotes.forEach((note, i) => {
          const bar = meta0.data[i];
          const topY = y.getPixelForValue(totalDelay[i]);
          c.font = 'bold 13px Figtree, Arial';
          c.fillStyle = gapColors[i];
          c.textAlign = 'center';
          note.split('\\n').forEach((line, li, arr) => {
            c.fillText(line, bar.x, topY - 6 - (arr.length - 1 - li) * 15);
          });
        });
        c.restore();
      }
    }]
  });
})();

</script>
</body>
</html>
